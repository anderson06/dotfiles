set -g prefix C-a

set -g default-terminal "screen-256color"
set -g status-position bottom
set -g set-clipboard on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g allow-rename off
set -g mouse on
set -g focus-events on
set -g default-shell /bin/zsh
set -sa terminal-overrides ",xterm*:Tc"

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe "xclip -sel clip -i"

# Navigate panes using vim keys
bind h select-pane -L
bind l select-pane -R

# Switch sessions with prefix + j/k (like wezterm)
bind -r j switch-client -n
bind -r k switch-client -p

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# open new window in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# close all panes but the current
bind f kill-pane -a

# fuzzy-pick a ~/dev project -> create-or-attach a session (popup over fzf)
bind o display-popup -E "~/.local/bin/tmux-sessionizer"

# cross-project Claude Code sessions dashboard / monitor (waiters pinned on top).
# prefix+m opens it as a popup over your current pane; q closes the popup and
# returns you to exactly where you were — no session/window switching.
bind m display-popup -E -w 90% -h 85% "~/.local/bin/claude-dash"

# rename the CURRENT window to its Claude session title (read from pane_title)
bind T run-shell "~/.local/bin/tmux-claude-title"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Show the window NAME (#W) in the status bar instead of catppuccin's default
# (basename of the pane's cwd). Runs after tpm so it overrides the theme's format.
# Window name falls back to the current command for auto-named windows, and to the
# descriptive name set by `rename-window` / the new-window skill for Claude sessions.
#
# A waiting glyph is prepended when a window's active #{pane_title} starts with the
# Claude idle glyph (U+2733 ✳) — i.e. Claude is idle and waiting for a reply. While
# Claude works the title carries a braille spinner instead, so no glyph shows, and
# once you reply the title loses ✳ so the glyph clears on its own. The glyph is
# computed by ~/.local/bin/tmux-claude-glyph, which tracks a persistent per-window
# "seen" flag so a viewed-but-unanswered waiter does not snap back to the unseen
# glyph after you switch away. Three states: 👀 waiting + focused, 👁 waiting + seen
# earlier (walked away, still unanswered), 🔔 waiting + never seen. The name (#W) is
# a static snapshot; the glyph tracks live state on each redraw, so status-interval
# governs how fast it updates. #() re-runs the script per window every interval.
set -g status-interval 2
set -gw window-status-current-format "#[fg=#fab387,bg=#1e1e2e]█#[fg=#1e1e2e,bg=#fab387]#I#[fg=#fab387,bg=#1e1e2e,nobold,nounderscore,noitalics]█ #[fg=#cdd6f4,bg=#1e1e2e]#(~/.local/bin/tmux-claude-glyph #{window_id} 1)#W#[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]█"
set -gw window-status-format "#[fg=#89b4fa,bg=#1e1e2e]█#[fg=#313244,bg=#89b4fa]#I#[fg=#89b4fa,bg=#313244,nobold,nounderscore,noitalics]█ #[fg=#cdd6f4,bg=#313244]#(~/.local/bin/tmux-claude-glyph #{window_id} 0)#W#[fg=#313244,bg=#1e1e2e,nobold,nounderscore,noitalics]█"
